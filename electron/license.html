<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browze Bot — Ativação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1; --secondary: #8b5cf6;
      --bg: #070712; --card: #0f0f1e; --border: rgba(99,102,241,0.2);
      --text: #f1f5f9; --muted: #94a3b8; --green: #22c55e; --red: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px);
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
      top: -150px; left: -100px;
      animation: pulse 6s ease-in-out infinite;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.15), transparent 70%);
      bottom: -100px; right: -50px;
      animation: pulse 6s ease-in-out infinite 3s;
    }
    @keyframes pulse {
      0%,100% { opacity:0.5; transform:scale(1); }
      50% { opacity:0.8; transform:scale(1.05); }
    }
    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 44px;
      width: 460px;
      max-width: 95vw;
      text-align: center;
      box-shadow: 0 0 80px rgba(99,102,241,0.12);
      transition: all 0.3s ease;
    }
    .logo { font-size: 3rem; margin-bottom: 4px; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.7rem; font-weight: 800;
      margin-bottom: 8px;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
    .input-wrap { text-align: left; margin-bottom: 20px; }
    .input-wrap label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); margin-bottom: 8px;
    }
    .key-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(99,102,241,0.06);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 15px;
      letter-spacing: 1px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .text-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(99,102,241,0.06);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .key-input:focus, .text-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .key-input::placeholder, .text-input::placeholder { color: rgba(148,163,184,0.4); letter-spacing: 0; font-family: 'Inter', sans-serif; }
    .btn-activate {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-activate:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
    .btn-activate:disabled { opacity: 0.6; cursor: default; transform: none; }
    .status {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      align-items: center; gap: 8px;
    }
    .status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: var(--red); display: flex; }
    .status.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: var(--green); display: flex; }
    .status.loading { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color: #a5b4fc; display: flex; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(165,180,252,0.3); border-top-color: #a5b4fc; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { height: 1px; background: var(--border); margin: 28px 0; }
    .buy-link { font-size: 13px; color: var(--muted); }
    .buy-link a { color: #818cf8; text-decoration: none; font-weight: 600; }
    .buy-link a:hover { text-decoration: underline; }
    .machine-id { font-size: 10px; color: rgba(148,163,184,0.35); margin-top: 24px; font-family: monospace; }
    
    /* Etapas */
    #step-profile { display: none; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Upload Foto */
    .photo-upload {
      display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .photo-preview {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: rgba(99,102,241,0.1);
      border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); font-size: 24px; cursor: pointer;
      overflow: hidden; transition: all 0.2s; position: relative;
    }
    .photo-preview:hover { border-color: var(--primary); background: rgba(99,102,241,0.15); }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .photo-preview span { position: absolute; font-size: 11px; text-transform: uppercase; font-weight: 700; opacity: 0; transition: opacity 0.2s; background: rgba(0,0,0,0.6); inset: 0; display: flex; align-items: center; justify-content: center; color: white; }
    .photo-preview:hover span { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="card" id="cardContainer">
    
    <!-- ETAPA 1: CHAVE -->
    <div id="step-key">
      <div class="logo">⚡</div>
      <h1>Browze Bot</h1>
      <p class="subtitle">Insira sua chave de licença para ativar</p>

      <div class="input-wrap">
        <label>Chave de Licença</label>
        <input
          class="key-input"
          type="text"
          id="licenseKey"
          placeholder="BROWZE-XXXX-XXXX-XXXX-XXXX"
          maxlength="29"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <button class="btn-activate" id="activateBtn" onclick="activate()">
        <span>Ativar Licença</span>
        <span>→</span>
      </button>

      <div class="status" id="statusEl"></div>

      <div class="divider"></div>

      <div class="buy-link">
        Não tem uma licença?
        <a href="https://browzebot.com.br" onclick="openExternal(event, 'https://browzebot.com.br')">Adquira aqui →</a>
      </div>

      <div class="machine-id" id="machineIdEl"></div>
    </div>

    <!-- ETAPA 2: PERFIL -->
    <div id="step-profile">
      <div class="logo">👤</div>
      <h1>Seu Perfil</h1>
      <p class="subtitle">Configure como você aparecerá no app</p>

      <div class="photo-upload">
        <label class="photo-preview" id="photoPreviewLabel">
          <input type="file" id="photoInput" accept="image/png, image/jpeg, image/jpg" style="display: none;" onchange="handlePhotoChange(event)">
          <div id="photoPlaceholder">📸</div>
          <span>Alterar</span>
        </label>
        <div style="font-size: 11px; color: var(--muted);">Clique para enviar sua foto (Opcional)</div>
      </div>

      <div class="input-wrap">
        <label>Seu Nome / Empresa</label>
        <input
          class="text-input"
          type="text"
          id="profileName"
          placeholder="Ex: João Silva"
          autocomplete="off"
        >
      </div>

      <button class="btn-activate" id="finishBtn" onclick="finishSetup()">
        <span>Entrar no Browze Bot</span>
        <span>→</span>
      </button>
    </div>

  </div>

  <script>
    let globalKey = '';
    let globalResult = null;
    let photoBase64 = null;

    // ----- ETAPA 1 -----
    document.getElementById('licenseKey').addEventListener('input', function () {
      let val = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      let parts = [];
      if (val.startsWith('BROWZE')) {
        val = val.slice(6).replace(/^-/, '');
        parts = val.match(/.{1,4}/g) || [];
        this.value = 'BROWZE-' + parts.join('-');
      } else {
        parts = val.match(/.{1,4}/g) || [];
        this.value = parts.join('-');
      }
    });

    document.getElementById('licenseKey').addEventListener('keydown', e => {
      if (e.key === 'Enter') activate();
    });

    function showStatus(msg, type) {
      const el = document.getElementById('statusEl');
      el.className = `status ${type}`;
      el.innerHTML = type === 'loading'
        ? `<div class="spinner"></div><span>${msg}</span>`
        : `<span>${msg}</span>`;
    }

    async function activate() {
      const key = document.getElementById('licenseKey').value.trim();
      if (!key || key.length < 10) {
        showStatus('❌ Insira uma chave válida', 'error');
        return;
      }

      const btn = document.getElementById('activateBtn');
      btn.disabled = true;
      showStatus('Verificando licença...', 'loading');

      try {
        const result = await window.electronAPI.validateLicense(key);
        if (result.valid) {
          showStatus('✓ Licença ativada! Avançando...', 'success');
          
          globalKey = key;
          globalResult = result;
          
          // Pre-preenche o nome se o banco retornou (caso já exista no banco Turso)
          if (result.name) {
             document.getElementById('profileName').value = result.name;
          } else if (result.email) {
             document.getElementById('profileName').value = result.email.split('@')[0];
          }

          setTimeout(() => {
            document.getElementById('step-key').style.display = 'none';
            document.getElementById('step-profile').style.display = 'block';
          }, 1000);
          
        } else {
          showStatus(`❌ ${result.error || 'Licença inválida'}`, 'error');
          btn.disabled = false;
        }
      } catch (err) {
        showStatus('⚠️ Erro ao conectar com o servidor de licenças', 'error');
        btn.disabled = false;
      }
    }

    // ----- ETAPA 2 -----
    document.getElementById('profileName').addEventListener('keydown', e => {
      if (e.key === 'Enter') finishSetup();
    });

    function handlePhotoChange(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        photoBase64 = event.target.result;
        const ph = document.getElementById('photoPlaceholder');
        ph.innerHTML = `<img src="${photoBase64}" alt="Perfil">`;
        ph.style.width = '100%';
        ph.style.height = '100%';
      };
      reader.readAsDataURL(file);
    }

    function finishSetup() {
      const name = document.getElementById('profileName').value.trim() || 'Usuário';
      const btn = document.getElementById('finishBtn');
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner"></div><span>Carregando...</span>`;

      // Prepara o objeto de perfil
      const profile = { name, photo: photoBase64 };

      // Passa a chave, o resultado e o perfil para o Main Process
      window.electronAPI.licenseValid(globalKey, globalResult, profile);
    }

    // ----- UTILITÁRIOS -----
    function openExternal(e, url) {
      e.preventDefault();
      window.electronAPI?.openExternal(url);
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const id = await window.electronAPI?.getMachineId();
        if (id) {
          document.getElementById('machineIdEl').textContent = `ID do Dispositivo: ${id}`;
        }
      } catch {}
    });
  </script>
</body>
</html>
